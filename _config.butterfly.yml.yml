site_verification:
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# --------------------------------------
# 美化/特效
# --------------------------------------

# 自定义主题颜色
# 注意: 颜色值必须用双引号括起来，如 "#000"，否则可能导致错误！
# theme_color:
#   enable: true
#   main: "#49B1F5"           # 主色
#   paginator: "#00c4b6"      # 分页器颜色
#   button_hover: "#FF7242"   # 按钮悬停颜色
#   text_selection: "#00c4b6" # 文本选中颜色
#   link_color: "#99a9bf"     # 链接颜色
#   meta_color: "#858585"     # 元信息颜色
#   hr_color: "#A4D8FA"       # 分割线颜色
#   code_foreground: "#F47466" # 代码块前景色
#   code_background: "rgba(27, 31, 35, .05)" # 代码块背景色
#   toc_color: "#00c4b6"      # 目录颜色
#   blockquote_padding_color: "#49b1f5" # 引用块边框颜色
#   blockquote_background_color: "#49b1f5" # 引用块背景色
#   scrollbar_color: "#49b1f5" # 滚动条颜色
#   meta_theme_color_light: "ffffff" # 浅色模式 meta 主题色
#   meta_theme_color_dark: "#0d0d0d" # 深色模式 meta 主题色

# 分类和标签页的 UI 风格
# 可选: index (与首页相同) / default (与归档页相同) / 留空 (与归档页相同)
category_ui:
tag_ui:

# UI 元素是否使用圆角
rounded_corners_ui: true

# 是否使文本两端对齐，让每行宽度相等
text_align_justify: false

# 为页眉和页脚添加蒙层 (使文字更清晰)
mask:
  header: true
  footer: true

# 加载动画
preloader:
  enable: false
  # 动画来源
  # 1. fullpage-loading (全屏加载动画)
  # 2. pace (进度条)
  source: 1
  # pace 主题 (参见 https://codebyzach.github.io/pace/)
  pace_css_url:

# 页面切换过渡动画
enter_transitions: true

# 默认显示模式: light (浅色) / dark (深色)
display_mode: light

# 文章内容美化配置
beautify:
  enable: false
  # 应用范围: site (全站) / post (仅文章)
  field: post
  # 标题前缀图标 (Font Awesome 的 unicode 值，如 '\f0c1')
  title_prefix_icon:
  # 标题前缀图标颜色 (如 '#F47466')
  title_prefix_icon_color:

# 全局字体设置
# 除非你了解其工作原理，否则不要修改以下设置
font:
  global_font_size:   # 全局字体大小
  code_font_size:     # 代码字体大小
  font_family:        # 全局字体族
  code_font_family:   # 代码字体族

# 博客标题和副标题字体设置
blog_title_font:
  font_link:          # Google Font 链接
  font_family:        # 字体族

# 分割线图标设置
hr_icon:
  enable: true
  # Font Awesome 图标的 unicode 值，如 '\f0c1'
  icon:
  # 图标上边距
  icon_top:

# 打字机特效 (Activate Power Mode)
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: false
  colorful: true   # 是否彩色
  shake: true      # 是否抖动
  mobile: false    # 移动端是否启用

# 背景特效
# --------------------------------------

# Canvas 彩带特效
# 参考: https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false
  # 彩带大小
  size: 150
  # 透明度 (0 ~ 1)
  alpha: 0.6
  # 层级
  zIndex: -1
  # 点击是否切换颜色
  click_to_change: false
  # 移动端是否启用
  mobile: false

# Canvas 飘动彩带特效
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# Canvas 粒子连线特效 (canvas-nest)
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: false
  # 线条颜色 (RGB 值，用逗号分隔)，默认: '0,0,0'
  color: '0,0,255'
  # 线条透明度 (0~1)
  opacity: 0.7
  # 层级
  zIndex: -1
  # 线条数量
  count: 99
  # 移动端是否启用
  mobile: false

# 鼠标点击特效: 烟花
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击特效: 爱心
click_heart:
  enable: false
  mobile: false

# 鼠标点击特效: 文字
clickShowText:
  enable: false
  # 显示的文字列表
  text:
    # - I
    # - LOVE
    # - YOU
  fontSize: 15px
  # 是否随机选取文字
  random: false
  # 移动端是否启用
  mobile: false

# --------------------------------------
# 灯箱 (Lightbox) 设置
# --------------------------------------

# 选择灯箱插件: fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 留空表示不启用灯箱
lightbox:

# --------------------------------------
# 标签插件 (Tag Plugins) 设置
# --------------------------------------

# 文章系列 (Series)
series:
  enable: false
  # 排序依据: title (标题) / date (日期)
  orderBy: 'title'
  # 排序顺序: 1 (升序) / -1 (降序)
  order: 1
  # 是否显示系列序号
  number: true

# ABCJS - ABC 音乐记谱法插件
# https://github.com/paulrosen/abcjs
abcjs:
  enable: false
  per_page: true

# Mermaid 图表
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: false
  # 是否使用代码块 (```mermaid) 来编写图表
  code_write: false
  # 内置主题: default / forest / dark / neutral
  theme:
    light: default  # 浅色模式主题
    dark: dark      # 深色模式主题
  # 是否启用 "在新标签页中打开" 按钮
  open_in_new_tab: true
  # 是否启用缩放和平移
  zoom_pan: true

# Chart.js 图表
# 参见 https://www.chartjs.org/docs/latest/
chartjs:
  enable: false
  # 除非你了解其工作原理，否则不要修改以下设置
  # 以下默认设置仅在 MD 语法未指定时使用
  # 图表通用字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表通用边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图和极地区域图的刻度标签背景色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# Note - Bootstrap 提示框
note:
  # 提示框样式:
  #  - simple    bs-callout 旧警告样式，默认。
  #  - modern    bs-callout 新 (v2-v3) 警告样式。
  #  - flat      扁平样式，带背景，类似 Mozilla 或 StackOverflow。
  #  - disabled  禁用所有 note 标签的 CSS 样式导入。
  style: flat
  # 是否显示图标
  icons: true
  # 边框圆角
  border_radius: 3
  # 对于 modern 和 flat 样式，背景色偏移量 (百分比)
  # modern: -12 | 12; flat: -18 | 6
  # 此选项也适用于 label 标签变量，即使在 disabled 模式下也可用
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# Pjax (无刷新加载)
# https://github.com/MoOx/pjax
pjax:
  enable: false
  # 排除特定页面不使用 pjax，例如 '/music/'
  exclude:
    # - /xxxxxx/

# APlayer/Meting 注入
aplayerInject:
  enable: false
  per_page: true

# Snackbar - 消息通知 (Toast)
# https://github.com/polonel/SnackBar
# 位置: top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  enable: false
  position: bottom-left
  # 浅色/深色模式下的背景颜色
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# Instant.page (预加载)
# https://instant.page/
instantpage: false

# 图片懒加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  enable: false
  # 是否使用浏览器原生懒加载 (替代 vanilla-lazyload)
  native: false
  # 应用范围: site (全站) / post (仅文章)
  field: site
  # 占位图
  placeholder:
  # 是否启用模糊效果 (在图片加载完成前)
  blur: false

# PWA (渐进式 Web 应用)
# 参见 https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  enable: false
  manifest:      # manifest.json 路径
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

# Open Graph 元标签
# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  enable: true
  option:
    # twitter_card:
    # twitter_image:
    # twitter_id:
    # twitter_site:
    # google_plus:
    # fb_admins:
    # fb_app_id:

# 结构化数据 (Structured Data)
# https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  enable: false
  # 站点的备用名称，用于结构化数据
  # 格式: ['name1', 'name2']
  alternate_name:

# 添加 CSS 厂商前缀以确保兼容性
css_prefix: true

# 注入代码
# 在 </head> 标签前插入代码 (head)，在 </body> 标签前插入代码 (bottom)
inject:
  head:
    # - <link rel="stylesheet" href="/xxx.css">
  bottom:
    # - <script src="xxxx"></script>

# CDN 设置
# 除非你了解其工作原理，否则不要修改以下设置
CDN:
  # 内部和第三方脚本的 CDN 提供商
  # 可选: local (本地) / jsdelivr / unpkg / cdnjs / custom (自定义)
  # 注意: 开发版本 (dev) 的内部脚本只能使用 'local'
