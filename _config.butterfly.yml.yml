# --------------------------------------
# Hexo Butterfly 主题配置文件
# 如有疑问，请参阅官方文档
# 中文文档: https://butterfly.js.org/
# 英文文档: https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  # 导航栏 Logo 图片
  logo:
  # 是否在导航栏显示站点标题
  display_title: true
  # 是否在导航栏显示文章标题 (进入文章页后)
  display_post_title: true
  # 导航栏是否固定 (滚动时保持置顶)
  fixed: true

# 菜单项配置
# 格式: 菜单名称: 链接 || Font Awesome 图标
menu:
  首页: / || fas fa-home
  知识分享: /categories/zsfx/ || fas fa-book
  学习资料: /categories/xxzl/ || fas fa-archive
  软件工具: /categories/rjgj/ || fas fa-download
  关于本站: /about/ || fas fa-user

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题: darker / pale night / light / ocean / false (false表示禁用主题，使用默认)
  theme: light
  # 是否启用 Mac 风格 (窗口按钮)
  macStyle: false
  # 代码块高度限制 (单位: px)，超过高度显示滚动条
  height_limit: false
  # 是否自动换行 (长代码不换行则显示横向滚动条)
  word_wrap: false

# 代码块工具栏
  # 是否显示复制按钮
  copy: true
  # 是否显示语言标签
  language: true
  # 代码块初始收缩状态: true (收缩) / false (展开) / none (展开并隐藏按钮)
  shrink: false
  # 是否显示全屏按钮
  fullpage: false

# 社交媒体链接
# 格式: 图标: 链接 || 描述 || 颜色 (可选)
social:
  # 示例: fab fa-github: https://github.com/xxxxx || Github || '#24292e'
  # 示例: fas fa-envelope: mailto:xxxxxx@gmail.com || Email || '#4a7dbe'

# --------------------------------------
# 图片设置
# --------------------------------------

# 网站图标 (浏览器标签页图标)
favicon: /img/hei.png

# 头像设置
avatar:
  # 头像图片路径
  img: /img/touxiang.jpg
  # 头像是否开启旋转动画
  effect: false

# 是否禁用所有页面的顶部大图
disable_top_img: false

# 默认的顶部大图 (当页面未单独设置时使用)
default_top_img:

# 首页的顶部大图
index_img:

# 归档页面的顶部大图
archive_img:

# 标签页 (单个标签对应的页面) 的顶部大图
tag_img:

# 为特定标签设置独立的顶部大图
# 格式:
#  - 标签名: 图片路径
tag_per_img:

# 分类页 (单个分类对应的页面) 的顶部大图
category_img:

# 为特定分类设置独立的顶部大图
# 格式:
#  - 分类名: 图片路径
category_per_img:

# 页脚的背景图 (设为false则无背景图)
footer_img: false

# 网站全局背景
# 可设置为颜色值、图片URL或包含颜色/图片URL的数组
# 若为数组，每次加载时会从中随机选取一个
background:

# 封面图设置
cover:
  # 首页文章列表是否启用封面图
  index_enable: true
  # 侧边栏是否启用封面图
  aside_enable: true
  # 归档页面是否启用封面图
  archives_enable: true
  # 当文章未设置封面图时，使用的默认封面图列表 (随机显示)
  default_cover:
    # - xxx.jpg

# 图片加载失败时的替代图片
error_img:
  # 友链头像加载失败时显示
  flink: /img/friend_404.gif
  # 文章内图片加载失败时显示
  post_page: /img/404.jpg

# 简洁的 404 页面设置
error_404:
  enable: false
  subtitle: '页面未找到'
  background: /img/error-page.png

# 文章元信息 (日期、分类、标签等) 显示设置
post_meta:
  # 首页文章列表的元信息
  page:
    # 日期显示类型: created (创建日期) / updated (更新日期) / both (两者都显示)
    date_type: created
    # 日期显示格式: date (具体日期) / relative (相对时间，如“3天前”)
    date_format: date
    # 是否显示分类
    categories: true
    # 是否显示标签
    tags: false
    # 是否显示文字标签 (如“发布于”)
    label: true
  # 文章详情页的元信息
  post:
    # 元信息位置: left (左侧) / center (居中)
    position: left
    # 日期显示类型: created (创建日期) / updated (更新日期) / both (两者都显示)
    date_type: both
    # 日期显示格式: date (具体日期) / relative (相对时间)
    date_format: date
    # 是否显示分类
    categories: true
    # 是否显示标签
    tags: true
    # 是否显示文字标签
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页顶部大图区域，站点信息的位置偏移量，如 '300px' / '10%'
index_site_info_top:
# 首页顶部大图的高度，如 '300px' / '50vh'
index_top_img_height:

# 首页副标题 (Subtitle) 设置
subtitle:
  enable: false
  # 是否启用打字机效果
  effect: true
  # 打字机效果的详细配置 (typed.js 库的选项)
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
  # 副标题数据来源 (仅支持中文)
  # false: 禁用
  # 1: hitokoto.cn (一言)
  # 2: https://api.aa1.cn/doc/yiyan.html
  # 3: jinrishici.com (今日诗词)
  source: false
  # 副标题内容 (若关闭打字机效果，仅显示第一行)
  sub:

# 首页文章列表的布局样式
# 1: 封面在左，信息在右
# 2: 封面在右，信息在左
# 3: 封面和信息左右交替
# 4: 封面在上，信息在下
# 5: 信息显示在封面图上
# 6: 瀑布流布局 - 封面在上，信息在下
# 7: 瀑布流布局 - 信息显示在封面图上
index_layout: 3

# 首页文章列表的内容显示方式
index_post_content:
  # 方式: 1 (仅显示描述) / 2 (有描述则显示描述，否则显示自动摘要) / 3 (自动摘要，默认) / false (不显示)
  method: 2
  # 若使用方式 2 或 3，摘要的截取长度 (字数)
  length: 500

# --------------------------------------
# 文章详情页设置
# --------------------------------------

# 目录 (Table of Contents) 设置
toc:
  # 文章页是否启用目录
  post: true
  # 独立页面 (如 about) 是否启用目录
  page: false
  # 是否显示章节编号 (如 1.、1.1.)
  number: true
  # 目录是否默认展开
  expand: false
  # 是否使用简洁样式 (仅用于文章页)
  style_simple: false
  # 是否在回到顶部按钮上显示阅读进度百分比
  scroll_percent: true

# 文章版权信息
post_copyright:
  enable: false
  # 是否解码 HTML 实体 (如 &lt; 转为 <)
  decode: false
  # 作者链接 (留空则使用站点配置)
  author_href: 
  # 许可协议名称
  license: CC BY-NC-SA 4.0
  # 许可协议链接
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏/赞助设置
reward:
  enable: false
  # 打赏按钮文字
  text:
  # 二维码图片列表
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

# 文章编辑链接
# 方便在线浏览和编辑博客源码
post_edit:
  enable: false
  # 编辑链接地址
  # 例如: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  url:

# 相关文章推荐
related_post:
  enable: true
  # 推荐的文章数量
  limit: 6
  # 排序依据: created (创建日期) / updated (更新日期)
  date_type: created

# 文章分页导航 (上一篇/下一篇)
# 1: “下一篇” 指向较旧的文章 (按时间正序)
# 2: “下一篇” 指向较新的文章 (按时间倒序)
# false: 禁用分页导航
post_pagination: 1

# 文章过期提醒
noticeOutdate:
  enable: false
  # 样式: simple (简洁) / flat (平面)
  style: flat
  # 文章发布多少天后显示过期提醒
  limit_day: 365
  # 提醒位置: top (顶部) / bottom (底部)
  position: top
  # 提示信息模板
  message_prev: 距离上次更新已过
  message_next: 天，部分内容可能已过时。

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  # 页脚导航菜单 (与主菜单相同)
  nav:
  # 站点所有者信息
  owner:
    enable: true
    # 建站年份
    since: 2025
  # 版权信息 (主题和框架)
  copyright:
    enable: false
    # 是否显示版本号
    version: false
  # 自定义页脚文本 (支持 HTML)
  custom_text:

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  # 是否启用侧边栏
  enable: true
  # 是否隐藏侧边栏 (可通过右下角按钮切换)
  hide: false
  # 是否在右下角显示切换侧边栏的按钮
  button: true
  # 在移动设备上是否显示侧边栏
  mobile: true
  # 侧边栏位置: left (左侧) / right (右侧)
  position: right
  # 在特定页面是否显示侧边栏
  display:
    archive: true  # 归档页
    tag: true      # 标签页
    category: true # 分类页
  # 作者信息卡片
  card_author:
    enable: true
    # 作者描述
    description:
    # 卡片按钮
    button:
      enable: true
      icon: fab fa-github
      text: 加入社区群
      link: https://qm.qq.com/q/deJAXNQpEY
# 公告卡片
  card_announcement:
    enable: true
    content: |
     <p>这里是专注于知识与软件分享的站点，我会持续更新实用学习资料、高效软件工具。</p>
     <p>如果你有优质的学习资源或好用的软件小工具，欢迎联系我投稿，整理后统一分享给大家！</p>
     <br>
     <a href="https://qm.qq.com/q/deJAXNQpEY">
      <img src="/img/qun.png" style="width: 100%; display:block; margin:0 auto;" alt="cc社区群">
     </a>
     <p style="text-align:center; font-size:12px; margin-top:8px;">点击或扫码｜cc社区群</p>
  # 最新文章卡片
  card_recent_post:
    enable: true
    # 显示数量 (设为0显示全部)
    limit: 5
    # 排序依据: date (日期) / updated (更新日期)
    sort: updated
    # 排序顺序 (1: 升序, -1: 降序)
    sort_order:
  # 最新评论卡片
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    # 缓存时间 (分钟)，数据存入 localStorage
    storage: 10
    # 是否显示评论者头像
    avatar: true
  # 分类卡片
  card_categories:
    enable: true
    # 显示数量 (设为0显示全部)
    limit: 8
    # 展开状态: none (不展开) / true (展开) / false (不展开)
    expand: none
    sort_order:
  # 标签卡片
  card_tags:
    enable: true
    # 显示数量 (设为0显示全部)
    limit: 40
    # 是否为标签添加随机颜色
    color: false
    # 自定义标签颜色 (格式: 标签名: 颜色值)
    custom_colors:
    # 排序方式: random (随机) / name (按名称) / length (按文章数量)
    orderby: random
    # 排序顺序: 1 (升序) / -1 (降序)
    order: 1
    sort_order:
  # 归档卡片
  card_archives:
    enable: true
    # 归档类型: monthly (按月) / yearly (按年)
    type: monthly
    # 日期格式 (例如: YYYY年MM月 / MMMM YYYY)
    format: MMMM YYYY
    # 排序顺序: 1 (升序) / -1 (降序)
    order: -1
    # 显示数量 (设为0显示全部)
    limit: 8
    sort_order:
  # 文章系列卡片
  card_post_series:
    enable: true
    # 是否显示系列名称作为标题
    series_title: false
    # 排序依据: title (标题) / date (日期)
    orderBy: 'date'
    # 排序顺序: 1 (升序) / -1 (降序)
    order: -1
  # 网站信息卡片
  card_webinfo:
    enable: true
    # 是否显示文章总数
    post_count: true
    # 是否显示最后更新时间
    last_push_date: true
    sort_order:
    # 运行时间 (建站时长) 计算的起始时间
    # 格式: 月/日/年 时间 或 年/月/日 时间
    # 留空则不启用此功能
    runtime_date:

# --------------------------------------
# 右下角按钮设置
# --------------------------------------

# 右下角按钮距离底部的距离 (默认单位: px)
rightside_bottom:

# 繁体中文/简体中文转换
translate:
  enable: false
  # 按钮默认显示的文字
  default: 繁
  # 网站默认语言: 1 (繁体中文) / 2 (简体中文)
  defaultEncoding: 2
  # 翻译延迟时间 (毫秒)
  translateDelay: 0
  # 当语言为简体中文时，按钮显示的文字
  msgToTraditionalChinese: '繁'
  # 当语言为繁体中文时，按钮显示的文字
  msgToSimplifiedChinese: '簡'

# 阅读模式 (隐藏侧边栏、广告等，聚焦内容)
readmode: true

# 深色/夜间模式
darkmode:
  enable: true
  # 是否显示切换深色/浅色模式的按钮
  button: true
  # 自动切换深色/浅色模式
  # autoChangeMode: 1 跟随系统设置 (若系统不支持，则在晚上6点到早上6点之间切换)
  # autoChangeMode: 2 在晚上6点到早上6点之间强制切换
  # autoChangeMode: false 禁用自动切换
  autoChangeMode: false
  # 浅色模式的开始和结束时间 (数值为0-24)
  start:   # 例如: 6 表示早上6点
  end:     # 例如: 18 表示晚上6点

# 在“回到顶部”按钮上显示滚动百分比
rightside_scroll_percent: false

# 右下角按钮的顺序和显示/隐藏
# 请不要修改以下设置，除非你了解其工作原理
# 可选值: readmode, translate, darkmode, hideAside, toc, chat, comment
# 不要重复相同的值
rightside_item_order:
  enable: false
  # 默认隐藏的按钮
  hide:
  # 默认显示的按钮
  show:

# 右下角配置按钮的动画效果
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

# 锚点 (标题跳转) 设置
anchor:
  # 滚动时，URL 是否根据标题 ID 自动更新
  auto_update: false
  # 点击标题时，是否滚动到标题位置并更新锚点
  click_to_scroll: false

# 图片是否显示标题/说明文字 (Figcaption)
photofigcaption: false

# 复制内容设置
copy:
  enable: true
  # 复制时是否添加版权信息
  copyright:
    enable: false
    # 触发版权信息添加的复制内容最小字数
    limit_count: 150

# 字数统计 (需安装 hexo-wordcount 插件)
wordcount:
  enable: false
  # 在文章元信息中显示文章字数
  post_wordcount: true
  # 在文章元信息中显示预计阅读时间
  min2read: true
  # 在侧边栏网站信息中显示站点总字数
  total_wordcount: true

# 不蒜子统计 (UV/PV)
busuanzi:
  # 是否显示站点访客数 (UV)
  site_uv: true
  # 是否显示站点总访问量 (PV)
  site_pv: true
  # 是否显示文章页阅读量
  page_pv: true

# --------------------------------------
# 数学公式
# --------------------------------------

# 关于 per_page 设置
# 若设为 true，则每个页面都加载 mathjax/katex 脚本
# 若设为 false，则仅当页面 Front-matter 中设置了 'mathjax: true' 或 'katex: true' 时才加载
math:
  # 选择渲染引擎: mathjax / katex (留空表示不使用)
  use:
  # 是否在每个页面加载脚本
  per_page: true
  # 是否隐藏滚动条 (KaTeX 滚动条)
  hide_scrollbar: false

# MathJax 配置
mathjax:
    # 是否启用右键菜单
    enableMenu: true
    # 公式编号: all (全部) / ams (AMS 模式) / none (无)
    tags: none

# KaTeX 配置
katex:
    # 是否启用复制公式功能
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  # 选择搜索引擎: algolia_search / local_search / docsearch
  # 留空表示不启用搜索
  use: local_search
  # 搜索框占位符文本
  placeholder: 请输入搜索内容

# Algolia 搜索配置
  algolia_search:
    # 每页搜索结果数
    hitsPerPage: 6

# 本地搜索配置
  local_search:
    # 开启搜索功能
    enable: true
    # 页面加载时是否预加载搜索数据
    preload: false
    # 每篇文章显示前 n 条结果，设为 -1 显示全部
    top_n_per_article: 1
    # 是否将 HTML 字符串转换为可读文本
    unescape: false
    # 搜索结果分页配置
    pagination:
      enable: false
      # 每页搜索结果数
      hitsPerPage: 8
    # 自定义 CDN 地址
    CDN:
    
toolbar:
  enable: true
  # 显示搜索按钮
  search: true
  # 暗黑模式切换按钮
  darkmode: true
  # 阅读模式
  readmode: true
  # 返回顶部
  backtop: true

# Docsearch 配置 (Algolia 的 DocSearch)
  # https://docsearch.algolia.com/
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 选择分享工具: sharejs / addtoany
  # 留空表示不启用分享
  use: sharejs

# Share.js 配置
  # https://github.com/overtrue/share.js
  sharejs:
    # 启用的分享平台
    sites: facebook,x,wechat,weibo,qq

# AddToAny 配置
  # https://www.addtoany.com/
  addtoany:
    # 启用的分享平台
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多可配置两个评论系统，第一个将作为默认显示
  # 留空表示不启用评论
  # 支持: Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 两个评论系统格式: Disqus,Waline
  use:
  # 是否在按钮旁显示评论系统名称
  text: true
  # 懒加载: 当评论元素进入视口时才加载评论系统
