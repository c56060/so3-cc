# Hexo 站点配置文件
## 文档: https://hexo.io/zh-cn/docs/configuration.html
## 源码: https://github.com/hexojs/hexo/

# --------------------------------------
# 站点信息 (Site)
# --------------------------------------
# 这些信息会显示在网站各处，并被主题调用
title: cc社区              # 网站标题
subtitle: ''               # 网站副标题
description: '学习资料分享、实用软件工具下载。'            # 网站描述 (用于 SEO)
keywords: 学习资料分享,软件下载,免费学习资源,办公软件,教程资源,考研资料,软件工具,学习素材                 # 网站关键词 (用于 SEO)
author: cc                 # 作者名称
language: zh-CN            # 网站语言 (如: zh-CN, en)
timezone: 'Asia/Shanghai'               # 网站时区 (留空则使用系统时区)

# --------------------------------------
# 网址设置 (URL)
# --------------------------------------
# 务必正确设置，否则会影响搜索、评论等功能
url: https://www.so3.de5.net    # 网站最终部署地址 (必须以 http:// 或 https:// 开头)
permalink: :category/:abbrlink/        # 文章永久链接格式
permalink_defaults:        # 链接中各段的默认值
pretty_urls:               # 美化 URL 设置
  trailing_index: true     # 是否移除链接末尾的 'index.html' (true: 保留, false: 移除)
  trailing_html: true      # 是否移除链接末尾的 '.html' (true: 保留, false: 移除)

# --------------------------------------
# 文章链接缩写插件
# --------------------------------------
abbrlink:
  alg: crc32
  rep: dec
  drafts: false

# --------------------------------------
# 目录设置 (Directory)
# --------------------------------------
source_dir: source         # 源文件目录 (存放文章、页面等)
public_dir: public         # 生成的静态文件输出目录
tag_dir: tags              # 标签页面目录
archive_dir: archives      # 归档页面目录
category_dir: categories   # 分类页面目录
code_dir: downloads/code   # 代码文件目录 (source 下的子目录)
i18n_dir: :lang            # 国际化语言目录
skip_render:               # 不进行渲染，直接复制的文件或目录 (支持 glob 表达式)

# --------------------------------------
# 文章写作设置 (Writing)
# --------------------------------------
new_post_name: :title.md   # 新文章的默认文件名格式
default_layout: post       # 默认布局 (post, page, draft)
titlecase: false           # 是否将标题转换为标题格式 (首字母大写)
external_link:             # 外部链接设置
  enable: true             # 是否在新标签页中打开外部链接
  field: site              # 适用范围 (site: 全站, post: 仅文章)
  exclude: ''              # 排除的域名 (如: 'example.com')
filename_case: 0           # 文件名大小写转换 (0: 不转换, 1: 小写, 2: 大写)
render_drafts: false       # 是否渲染草稿 (true: 渲染)
post_asset_folder: false   # 是否启用文章资源文件夹 (用于存放文章图片等)
relative_link: false       # 是否使用相对路径 (建议保持 false)
future: true               # 是否显示未来日期的文章
syntax_highlighter: highlight.js  # 代码高亮引擎 (highlight.js / prismjs / none)
highlight:                 # Highlight.js 配置
  line_number: true        # 是否显示行号
  auto_detect: false       # 是否自动检测语言
  tab_replace: ''          # 替换 Tab 为空格数
  wrap: true               # 是否自动换行
  hljs: false              # 是否使用 hljs 类名
prismjs:                   # PrismJS 配置
  preprocess: true         # 是否预处理
  line_number: true        # 是否显示行号
  tab_replace: ''          # 替换 Tab 为空格数

# --------------------------------------
# 首页生成设置 (Home page setting)
# --------------------------------------
# 由 hexo-generator-index 插件控制
index_generator:
  path: ''                 # 首页路径 (默认: '')
  per_page: 10             # 每页显示文章数 (设为 0 则不分页)
  order_by: -date          # 排序方式 (按日期降序)

# --------------------------------------
# 分类与标签 (Category & Tag)
# --------------------------------------
default_category: uncategorized  # 默认分类名称
category_map:
  知识分享: zsfx
  学习资料: xxzl
  软件工具: rjgj             # 分类别名映射 (用于 URL)
tag_map:                   # 标签别名映射 (用于 URL)

# --------------------------------------
# 元数据元素 (Metadata elements)
# --------------------------------------
# 是否生成 meta generator 标签
meta_generator: true

# --------------------------------------
# 日期 / 时间格式 (Date / Time format)
# --------------------------------------
# 使用 Moment.js 解析和显示日期
date_format: YYYY-MM-DD    # 日期格式
time_format: HH:mm:ss      # 时间格式
# updated 值的来源: 'mtime' (文件修改时间) / 'date' (文章日期) / 'empty' (不设置)
updated_option: 'mtime'

# --------------------------------------
# 分页设置 (Pagination)
# --------------------------------------
per_page: 10               # 每页显示的文章数 (设为 0 则不分页)
pagination_dir: page       # 分页目录名称 (如: /page/2/)

# --------------------------------------
# 包含 / 排除文件 (Include / Exclude)
# --------------------------------------
# include/exclude 只适用于 'source/' 文件夹
include:                   # 包含的文件 (通常用于隐藏文件)
exclude:                   # 排除的文件
ignore:                    # 忽略的文件 (适用于所有文件夹)

# --------------------------------------
# 扩展 (Extensions)
# --------------------------------------
# 插件列表: https://hexo.io/zh-cn/plugins/
# 主题列表: https://hexo.io/zh-cn/themes/
theme: butterfly           # 当前使用的主题名称 (必须与主题文件夹名一致)

# --------------------------------------
# 主题配置 (Theme Configuration)
# --------------------------------------
# 方式1: 直接在站点配置文件中设置 (优先级最高)
theme_config:              # 主题配置 (在此处设置会覆盖主题目录下的 _config.yml)
  # 例如: bio: "这是我的个人博客"

# 方式2: 使用独立的主题配置文件 (如 _config.butterfly.yml)
# 推荐使用此方式，与站点配置分离，便于管理

# --------------------------------------
# 部署设置 (Deployment)
# --------------------------------------
# 文档: https://hexo.io/zh-cn/docs/one-command-deployment
deploy:
  type: ''                 # 部署类型 (如: git, heroku, rsync)

# --------------------------------------
# 额外配置说明
# --------------------------------------
# 1. 如果网站部署在子目录 (如 https://example.com/blog)：
#    url: https://example.com/blog
#    root: /blog/

# 2. include/exclude 示例：
#    include:
#      - ".nojekyll"
#      - "css/_typing.css"
#    exclude:
#      - "js/test.js"
#      - "js/**/*"

# 3. 使用备选配置文件：
#    hexo server --config custom.yml
#    hexo server --config custom.yml,custom2.json

search:
  path: search.xml
  field: post
  content: true